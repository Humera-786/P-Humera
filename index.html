<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillBridge AI Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2,#6ee7b7);
  background-size:400% 400%;
  animation: bg 10s infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* LOGIN */
#loginBox{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginCard{
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:280px;
}

input{
  width:90%;
  padding:10px;
  margin:10px 0;
}

/* APP */
#app{
  display:none;
  padding:15px;
}

.container{
  max-width:750px;
  margin:auto;
  background:rgba(255,255,255,0.2);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

/* TASK */
li{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:10px 0;
  background:rgba(255,255,255,0.3);
  border-radius:10px;
}

.done{
  text-decoration:line-through;
  opacity:0.6;
}

/* BUTTON */
button{
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#111;
  color:white;
}

/* TIMER */
.timer{
  font-size:22px;
  margin:10px 0;
  font-weight:bold;
}

/* PROGRESS */
#progressBox{
  margin:10px 0;
  font-weight:bold;
}

#progressBar{
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

#progressFill{
  height:10px;
  width:0%;
  background:#00ff99;
  transition:0.3s;
}

/* FINISH BUTTON */
#finishBtn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 22px;
  border-radius:50px;
  background:#ff4081;
  color:white;
  font-size:16px;
  display:none;
  z-index:999;
}

/* ANIMATION */
@keyframes rise{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-120vh);opacity:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="loginCard">
    <h2>👤 Login</h2>
    <input id="username" placeholder="Enter your name">
    <button onclick="login()">Start</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="container">

    <h2 id="welcome"></h2>

    <div class="timer" id="timer">25:00</div>
    <button onclick="startTimer()">Start Timer</button>
    <button onclick="resetTimer()">Reset</button>

    <hr>

    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <!-- PROGRESS -->
    <div id="progressBox">
      Progress: <span id="progressText">0/0</span>
      <div id="progressBar">
        <div id="progressFill"></div>
      </div>
    </div>

    <ul id="taskList"></ul>

  </div>
</div>

<!-- FINISH -->
<button id="finishBtn" onclick="finishSession()">🎉 Finish Session</button>

<script>

let tasks = [];
let time = 1500;
let interval;
let userName = "";

/* LOGIN */
function login(){
  userName = document.getElementById("username").value;

  if(!userName){
    alert("Enter your name");
    return;
  }

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("finishBtn").style.display="block";

  document.getElementById("welcome").innerText =
    "Welcome " + userName + " 🚀";

  speak("Welcome " + userName);
}

/* SPEAK */
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.speak(msg);
}

/* TIMER */
function startTimer(){
  clearInterval(interval);

  interval = setInterval(()=>{
    if(time <= 0){
      clearInterval(interval);
      speak("Time is up");
      return;
    }

    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
      `${m}:${s<10?'0':''}${s}`;

  },1000);
}

function resetTimer(){
  clearInterval(interval);
  time = 1500;
  document.getElementById("timer").innerText = "25:00";
}

/* ADD TASK */
function addTask(){
  let t = document.getElementById("taskInput").value;
  if(!t) return alert("Enter task");

  tasks.push({text:t,done:false});
  document.getElementById("taskInput").value="";
  render();
}

/* COMPLETE */
function completeTask(i){
  tasks[i].done = true;
  render();
  speak("Good job " + userName);
}

/* DELETE */
function deleteTask(i){
  tasks.splice(i,1);
  render();
}

/* PROGRESS UPDATE */
function updateProgress(){
  let total = tasks.length;
  let done = tasks.filter(t=>t.done).length;

  document.getElementById("progressText").innerText =
    `${done}/${total}`;

  let percent = total === 0 ? 0 : (done/total)*100;
  document.getElementById("progressFill").style.width =
    percent + "%";
}

/* RENDER */
function render(){
  let list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((t,i)=>{
    list.innerHTML += `
      <li>
        <span class="${t.done?'done':''}">${t.text}</span>
        <div>
          <button onclick="completeTask(${i})">✔</button>
          <button onclick="deleteTask(${i})">❌</button>
        </div>
      </li>
    `;
  });

  updateProgress();
}

/* FINISH SESSION (FIXED) */
function finishSession(){

  if(tasks.length === 0){
    alert("Add at least one task first!");
    speak("Please add tasks first");
    return;
  }

  let completed = tasks.filter(t=>t.done).length;

  if(completed === 0){
    alert("Complete at least one task!");
    speak("Complete some tasks first");
    return;
  }

  clearInterval(interval);

  speak(`Great job ${userName}! You completed ${completed} tasks`);

  bigCelebration();
}

/* CELEBRATION */
function bigCelebration(){
  for(let i=0;i<50;i++){
    let c=document.createElement("div");
    c.style.position="fixed";
    c.style.width="8px";
    c.style.height="8px";
    c.style.left=Math.random()*100+"vw";
    c.style.top="0";
    c.style.background=["red","blue","green","yellow","pink"][Math.floor(Math.random()*5)];
    c.style.animation="rise 3s linear";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

</script>

</body>
</html>
